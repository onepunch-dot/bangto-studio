<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon-neural.svg" />
    <title>bangto Studio</title>
    <meta
      name="description"
      content="감성적인 브랜딩 페이지 콘셉트. 히어로, 짧은 약력, 오비탈 카드 상품과 서비스, 문의 섹션으로 구성된 정적 랜딩 페이지."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>
      <div class="ambient ambient-three"></div>

      <main id="top">
        <section class="hero section-reveal" data-section="top">
          <div class="hero-visual" aria-hidden="true">
            <div class="hero-visual-frame">
              <div class="hero-sculpture-stage">
                <div class="hero-ripple-layer" data-hero-ripples aria-hidden="true"></div>
                <div class="hero-sculpture-tilt">
                  <div class="hero-sculpture neural-sculpture" data-neural-sculpture>
                    <canvas class="neural-canvas" data-neural-canvas></canvas>
                    <div class="neural-cursor-glow"></div>
                    <div class="neural-vignette"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="hero-scroll-band" aria-hidden="true" data-hero-scroll-band></div>
        </section>

        <section id="about" class="about section-reveal" data-section="about">
          <div class="section-head">
            <h2>Quietly building, clearly moving.</h2>
          </div>

          <div class="about-layout">
            <article class="about-editorial">
              <p class="editorial-copy">
                Exploring AI,
                <span>and better digital.</span>
              </p>
            </article>

            <article class="about-bio">
              <div class="bio-row">
                <span class="bio-year">2014</span>
                <p>Built and ran two blogs, monetized through AdSense.</p>
              </div>
              <div class="bio-row">
                <span class="bio-year">Based in Seoul</span>
                <p>Quietly exploring AI, automation, and vive coding.</p>
              </div>
              <div class="bio-row">
                <span class="bio-year">Focus</span>
                <p>AI tools, vive coding, and workflow automation.</p>
              </div>
            </article>
          </div>
        </section>

        <section id="products" class="carousel-section section-reveal" data-section="products">
          <div class="section-head">
            <h2>products</h2>
          </div>

          <div class="carousel-shell" data-carousel="products" data-theme="warm">
            <div class="orbit orbit-large"></div>
            <div class="orbit orbit-small"></div>

            <div class="carousel-top">
              <div class="carousel-controls">
                <button class="control" type="button" data-dir="-1" aria-label="Previous product">
                  <span>&larr;</span>
                </button>
                <button class="control" type="button" data-dir="1" aria-label="Next product">
                  <span>&rarr;</span>
                </button>
              </div>
            </div>

            <div class="orbit-scene">
              <div class="orbit-track" data-track></div>
            </div>
          </div>
        </section>

        <section id="services" class="carousel-section section-reveal" data-section="services">
          <div class="section-head">
            <h2>Services</h2>
          </div>

          <div class="carousel-shell" data-carousel="services" data-theme="cool">
            <div class="orbit orbit-large"></div>
            <div class="orbit orbit-small"></div>

            <div class="carousel-top">
              <div class="carousel-controls">
                <button class="control" type="button" data-dir="-1" aria-label="Previous service">
                  <span>&larr;</span>
                </button>
                <button class="control" type="button" data-dir="1" aria-label="Next service">
                  <span>&rarr;</span>
                </button>
              </div>
            </div>

            <div class="orbit-scene">
              <div class="orbit-track" data-track></div>
            </div>
          </div>
        </section>

        <section id="contact" class="contact section-reveal" data-section="contact">
          <div class="contact-card">
            <h2>Contact Us</h2>
            <a class="button button-contact" href="https://open.kakao.com/o/sY7jr9mi" target="_blank" rel="noreferrer">Kakao</a>
          </div>
        </section>
      </main>

      <button class="scroll-top" type="button" aria-label="맨 위로 이동" data-scroll-top>
        <span aria-hidden="true">&uarr;</span>
      </button>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
